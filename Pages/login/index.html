<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ganhe-pix | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>


<div id="loader" class="loader-container hidden">
    <div class="spinner"></div>
    <p>Carregando...</p>
</div>






<script type="module" src="loader.js"></script>

<div id="toast-container"></div>
    <div class="glow"></div>
    
    <main class="auth-container">









<section id="login-form" class="auth-card">
            <header>
                <h1 class="brand">Ganhe<span>pix</span></h1>
                <p>Bem-vindo de volta</p>
            </header>

            <div class="form-group">
                <input type="email" id="login-email" placeholder="E-mail" required>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Senha" required>
                    <button type="button" class="toggle-pass" onclick="togglePassword('login-password')">👁️</button>
                </div>
            </div>



<!-- Procure onde estava o input e coloque esse bloco no lugar -->
<div class="lembrar-container">
    <input type="checkbox" id="lembrar-login">
    <label for="lembrar-login" id="label-lembrar">Manter conectado</label>
</div>



            <div class="actions">
                <a href="#" id="go-recover">Esqueceu a senha?</a>
            </div>


            <button id="btn-login" class="btn-primary">Entrar</button>

            <div class="divider"><span>ou</span></div>

            <button id="btn-google" class="btn-outline">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                Continuar com Google
            </button>


            <footer>
                Ainda não tem conta? <a href="#" id="go-register">Cadastre-se</a>
            </footer>
        </section>









<section id="register-form" class="auth-card hidden">
            <header>
                <h1 class="brand">Ganhe<span>pix</span></h1>
                <p>Crie sua conta gratuita</p>
            </header>

            <div class="form-group">
                <input type="email" id="reg-email" placeholder="Seu melhor e-mail" required>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" placeholder="Crie uma senha" required>
                    <button type="button" class="toggle-pass" onclick="togglePassword('reg-password')">👁️</button>
                </div>
            </div>

            <button id="btn-register" class="btn-primary">Criar Minha Conta</button>

            <footer>
                Já é membro? <a href="#" class="back-link">Fazer login</a>
            </footer>
        </section>









<section id="recover-form" class="auth-card hidden">
            <header>
                <h1 class="brand">Ganhe<span>pix</span></h1>
                <p>Recuperar acesso</p>
            </header>

            <div class="form-group">
                <input type="email" id="rec-email" placeholder="E-mail cadastrado" required>
            </div>

            <button id="btn-recover" class="btn-primary">Enviar Link</button>

            <footer>
                Lembrou a senha? <a href="#" class="back-link">Voltar</a>
            </footer>
        </section>

    </main>









<script type="module" src="js/app.js"></script>
</body>
</html>
