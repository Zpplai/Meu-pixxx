<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <!-- Título do site que aparece na aba do navegador -->
  <title>MeuPix</title>







  <!-- Configuração de PWA: Define o ícone e a cor do app no celular -->
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#00ff88">







  <!-- Importação do arquivo CSS para estilizar o layout -->
  <link rel="stylesheet" href="style.css">
</head>

<body>







  <!-- Tela de Splash: Animação de carregamento inicial do sistema -->
  <div class="splash">

    <div class="logo">💸</div>

    <h1>MeuPix</h1>

    <p>Preparando suas recompensas...</p>

    <div class="progress-box">
      <div class="progress"></div>
    </div>


    <!-- Botão de Instalação: Permite ao usuário baixar o app (PWA) -->
    <button id="installBtn">
      Baixar Aplicativo
    </button>

  </div>







  <!-- Importação do JavaScript: Responsável pela lógica e funções -->
  <script src="script.js"></script>

</body>
</html>
